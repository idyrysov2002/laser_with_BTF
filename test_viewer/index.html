<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experimental Data Viewer</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .controls-container {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
            font-size: 12px;
        }
        .control-group select, .control-group input {
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }
        .hidden {
            display: none;
        }
        .main-view {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .panel {
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #map-panel {
            flex: 1;
            border-right: 2px solid #eee;
            position: relative;
        }
        #chart-panel {
            flex: 1;
        }
        #resizer {
            width: 8px;
            background-color: #ddd;
            cursor: col-resize;
            transition: background-color 0.2s;
        }
        #resizer:hover {
            background-color: #aaa;
        }
        h3 {
            margin-top: 0;
            color: #444;
            text-align: center;
            font-size: 14px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
            justify-content: center;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .input-group input {
            width: 80px;
        }
        .input-group label {
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="controls-container">
    <div class="control-group">
        <label for="device-type">Device Type:</label>
        <select id="device-type">
            <option value="RSA306B">RSA306B</option>
            <option value="Tektronix_DPO71604C">Tektronix DPO71604C</option>
        </select>
    </div>
    <div class="control-group">
        <label for="wavelength">Wavelength:</label>
        <select id="wavelength"></select>
    </div>
    <div class="control-group">
        <label for="linewidth">Linewidth:</label>
        <select id="linewidth"></select>
    </div>
    <div class="control-group">
        <label for="voltage">Voltage:</label>
        <select id="voltage"></select>
    </div>
    
    <!-- RSA306B specific -->
    <div class="control-group rsa-controls">
        <label for="span">Span:</label>
        <select id="span"></select>
    </div>
    <div class="control-group rsa-controls">
        <label for="measurement-number">Measurement Number:</label>
        <select id="measurement-number"></select>
    </div>

    <!-- Tektronix specific -->
    <div class="control-group tek-controls hidden">
        <label for="duration">Duration:</label>
        <select id="duration"></select>
    </div>
    <div class="control-group tek-controls hidden">
        <label for="mode">Mode:</label>
        <select id="mode">
            <option value="sample">Sample</option>
            <option value="average">Average</option>
        </select>
    </div>
</div>

<div class="main-view">
    <div id="map-panel" class="panel">
        <h3>Heatmap: Frequency (GHz) vs Current & Delay</h3>
        <div id="heatmap" style="width: 100%; height: calc(100% - 60px);"></div>
        <div class="input-group">
            <label>Current (mA):</label>
            <input type="number" id="input-current" step="10">
            <label>Delay (ps):</label>
            <input type="number" id="input-delay" step="5">
        </div>
    </div>
    <div id="resizer"></div>
    <div id="chart-panel" class="panel">
        <h3 id="chart-title">Spectrum / Waveform</h3>
        <div id="spectrum-chart" style="width: 100%; height: calc(100% - 30px);"></div>
    </div>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const CONFIG = {
        devices: {
            RSA306B: {
                spans: ["6GHz", "100MHz", "1MHz"],
                measurementNumbers: ["1", "2", "3"]
            },
            Tektronix_DPO71604C: {
                durations: ["10ns", "50ns", "100ns", "500ns"],
                modes: ["sample", "average"]
            }
        },
        commonParams: {
            wavelengths: ["1530nm", "1540nm", "1550nm", "1560nm"],
            linewidths: ["0.1nm", "0.2nm", "0.5nm", "1.0nm"],
            voltages: ["0V", "1V", "2V", "3V", "4V", "5V"]
        },
        heatmap: {
            currents: Array.from({length: 41}, (_, i) => 100 + i * 10), // 100-500 mA
            delays: Array.from({length: 67}, (_, i) => i * 5) // 0-330 ps
        }
    };

    // ==================== MOCK DATA GENERATOR ====================
    const MockData = {
        generateHeatmap() {
            const currents = CONFIG.heatmap.currents;
            const delays = CONFIG.heatmap.delays;
            const zValues = [];
            
            for (let delayIdx = 0; delayIdx < delays.length; delayIdx++) {
                const row = [];
                const delay = delays[delayIdx];
                for (let currentIdx = 0; currentIdx < currents.length; currentIdx++) {
                    const current = currents[currentIdx];
                    // Frequency (GHz) depends on current and delay
                    let frequency = 193.0; // base frequency
                    frequency += (current - 300) * 0.002;
                    frequency += delay * 0.0008;
                    frequency += Math.sin(current / 40) * 0.3;
                    frequency += Math.cos(delay / 60) * 0.2;
                    frequency += (Math.random() - 0.5) * 0.05;
                    row.push(parseFloat(frequency.toFixed(3)));
                }
                zValues.push(row);
            }
            return { currents, delays, z: zValues };
        },

        generateSpectrumRSA(current, delay, span) {
            const numPoints = 800;
            const spanGHz = parseFloat(span);
            const x = Array.from({length: numPoints}, (_, i) => i * (spanGHz / numPoints));
            const y = x.map(freq => {
                const centerFreq = 3.0 + (current - 300) * 0.008 + delay * 0.003;
                let power = -75 + Math.exp(-Math.pow(freq - centerFreq, 2) / 0.08) * 50;
                power += (Math.random() - 0.5) * 2;
                return parseFloat(Math.min(-30, power).toFixed(2));
            });
            return { x, y, xLabel: "Frequency (GHz)", yLabel: "Power (dBm)" };
        },

        generateOscillogram(current, delay, duration) {
            const numPoints = 800;
            const durationNs = parseFloat(duration);
            const x = Array.from({length: numPoints}, (_, i) => i * (durationNs / numPoints));
            const y = x.map(time => {
                const amplitude = 0.8 * (current - 300) / 200;
                const frequency = 0.8 + delay * 0.005;
                let voltage = amplitude * Math.sin(2 * Math.PI * frequency * time);
                voltage += (Math.random() - 0.5) * 0.03;
                return parseFloat(voltage.toFixed(4));
            });
            return { x, y, xLabel: "Time (ns)", yLabel: "Voltage (V)" };
        },

        getSpectrum(deviceType, current, delay, span, duration) {
            if (deviceType === "RSA306B") {
                return this.generateSpectrumRSA(current, delay, span);
            } else {
                return this.generateOscillogram(current, delay, duration);
            }
        }
    };

    // ==================== APPLICATION STATE ====================
    let appState = {
        deviceType: "RSA306B",
        wavelength: "1550nm",
        linewidth: "0.1nm",
        voltage: "0V",
        span: "6GHz",
        measurementNumber: "1",
        duration: "10ns",
        mode: "sample",
        current: 300,
        delay: 165,
        heatmapData: null
    };

    // DOM elements
    const els = {
        deviceType: document.getElementById('device-type'),
        wavelength: document.getElementById('wavelength'),
        linewidth: document.getElementById('linewidth'),
        voltage: document.getElementById('voltage'),
        span: document.getElementById('span'),
        measurementNumber: document.getElementById('measurement-number'),
        duration: document.getElementById('duration'),
        mode: document.getElementById('mode'),
        inputCurrent: document.getElementById('input-current'),
        inputDelay: document.getElementById('input-delay'),
        rsaControls: document.querySelectorAll('.rsa-controls'),
        tekControls: document.querySelectorAll('.tek-controls'),
        chartTitle: document.getElementById('chart-title')
    };

    // Helper: populate select
    function populateSelect(select, options) {
        select.innerHTML = '';
        options.forEach(opt => {
            const option = document.createElement('option');
            option.value = opt;
            option.textContent = opt;
            select.appendChild(option);
        });
    }

    // Update UI based on device type
    function updateDeviceUI() {
        const isRSA = appState.deviceType === "RSA306B";
        els.rsaControls.forEach(el => el.classList.toggle('hidden', !isRSA));
        els.tekControls.forEach(el => el.classList.toggle('hidden', isRSA));
        
        if (isRSA) {
            populateSelect(els.span, CONFIG.devices.RSA306B.spans);
            populateSelect(els.measurementNumber, CONFIG.devices.RSA306B.measurementNumbers);
        } else {
            populateSelect(els.duration, CONFIG.devices.Tektronix_DPO71604C.durations);
        }
    }

    // Load and draw heatmap
    async function loadHeatmap() {
        const heatmapData = MockData.generateHeatmap();
        appState.heatmapData = heatmapData;
        
        // Set default current/delay to middle values
        const midCurrentIdx = Math.floor(heatmapData.currents.length / 2);
        const midDelayIdx = Math.floor(heatmapData.delays.length / 2);
        appState.current = heatmapData.currents[midCurrentIdx];
        appState.delay = heatmapData.delays[midDelayIdx];
        els.inputCurrent.value = appState.current;
        els.inputDelay.value = appState.delay;
        
        drawHeatmap(heatmapData);
        loadSpectrum();
    }

    function drawHeatmap(data) {
        const trace = {
            z: data.z,
            x: data.currents,
            y: data.delays,
            type: 'heatmap',
            colorscale: 'Viridis',
            colorbar: { title: 'Frequency (GHz)' },
            hovertemplate: 'Current: %{x} mA<br>Delay: %{y} ps<br>Freq: %{z:.3f} GHz<extra></extra>'
        };
        
        const layout = {
            xaxis: { title: 'Current (mA)' },
            yaxis: { title: 'Delay (ps)' },
            margin: { t: 30, l: 60, r: 50, b: 50 }
        };
        
        Plotly.newPlot('heatmap', [trace], layout, { responsive: true, displayModeBar: false });
        
        // Click handler
        document.getElementById('heatmap').on('plotly_click', (data) => {
            if (data.points.length) {
                const point = data.points[0];
                appState.current = point.x;
                appState.delay = point.y;
                els.inputCurrent.value = appState.current;
                els.inputDelay.value = appState.delay;
                loadSpectrum();
            }
        });
    }

    // Load and draw spectrum
    async function loadSpectrum() {
        const { deviceType, current, delay, span, duration, mode } = appState;
        
        const spectrumData = MockData.getSpectrum(deviceType, current, delay, span, duration);
        
        const trace = {
            x: spectrumData.x,
            y: spectrumData.y,
            type: 'scatter',
            mode: 'lines',
            line: { color: '#1f77b4', width: 1.5 }
        };
        
        const title = deviceType === "RSA306B" 
            ? `Spectrum: Current ${current}mA, Delay ${delay}ps`
            : `Oscillogram: Current ${current}mA, Delay ${delay}ps, Mode: ${mode}`;
        
        els.chartTitle.textContent = title;
        
        const layout = {
            xaxis: { title: spectrumData.xLabel },
            yaxis: { title: spectrumData.yLabel },
            margin: { t: 30, l: 50, r: 30, b: 50 }
        };
        
        Plotly.newPlot('spectrum-chart', [trace], layout, { responsive: true, displayModeBar: false });
    }

    // Handle manual input
    function handleManualInput() {
        const current = parseFloat(els.inputCurrent.value);
        const delay = parseFloat(els.inputDelay.value);
        if (!isNaN(current) && !isNaN(delay)) {
            appState.current = current;
            appState.delay = delay;
            loadSpectrum();
        }
    }

    // Handle parameter change (device, wavelength, etc.)
    function onParamsChange() {
        appState.deviceType = els.deviceType.value;
        appState.wavelength = els.wavelength.value;
        appState.linewidth = els.linewidth.value;
        appState.voltage = els.voltage.value;
        appState.span = els.span.value;
        appState.measurementNumber = els.measurementNumber.value;
        appState.duration = els.duration.value;
        appState.mode = els.mode.value;
        
        updateDeviceUI();
        loadHeatmap();
    }

    // Setup resizer
    function setupResizer() {
        const resizer = document.getElementById('resizer');
        const mapPanel = document.getElementById('map-panel');
        let isResizing = false;
        
        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
        });
        
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const containerRect = document.querySelector('.main-view').getBoundingClientRect();
            const newWidth = e.clientX - containerRect.left;
            if (newWidth > 150 && newWidth < containerRect.width - 150) {
                mapPanel.style.flex = 'none';
                mapPanel.style.width = `${newWidth}px`;
            }
        });
        
        document.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.cursor = 'default';
        });
    }

    // Initialize app
    function init() {
        // Populate common selects
        populateSelect(els.wavelength, CONFIG.commonParams.wavelengths);
        populateSelect(els.linewidth, CONFIG.commonParams.linewidths);
        populateSelect(els.voltage, CONFIG.commonParams.voltages);
        
        // Set default values
        els.wavelength.value = "1550nm";
        els.linewidth.value = "0.1nm";
        els.voltage.value = "0V";
        
        // Event listeners
        els.deviceType.addEventListener('change', onParamsChange);
        els.wavelength.addEventListener('change', onParamsChange);
        els.linewidth.addEventListener('change', onParamsChange);
        els.voltage.addEventListener('change', onParamsChange);
        els.span.addEventListener('change', onParamsChange);
        els.measurementNumber.addEventListener('change', onParamsChange);
        els.duration.addEventListener('change', onParamsChange);
        els.mode.addEventListener('change', onParamsChange);
        els.inputCurrent.addEventListener('change', handleManualInput);
        els.inputDelay.addEventListener('change', handleManualInput);
        
        updateDeviceUI();
        setupResizer();
        loadHeatmap();
    }
    
    // Start
    init();
</script>
</body>
</html>
